<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atenea — Tutor</title>
<style>
  /* ================================================================
     Design tokens — Atenea identity v1 (PR-F2, "refined dark").
     Night blue base, gold-olive accents. Kept as CSS variables so the
     future frontend rework can lift the identity wholesale.
     ================================================================ */
  :root {
    /* surfaces */
    --bg0: #0b0f15;        /* page */
    --bg1: #121822;        /* panels, tutor bubbles */
    --bg2: #1a2230;        /* raised elements, inputs */
    --border: #263140;
    --border-strong: #35455c;
    /* text */
    --text: #e9edf3;
    --muted: #94a2b4;
    --faint: #647285;
    /* identity accents */
    --gold: #d3b673;       /* primary accent — Athena's owl */
    --gold-soft: #b89c5e;
    --sage: #9cbf94;       /* secondary — growth, records */
    --info: #82b4e2;
    --danger: #dd9668;
    /* learner voice */
    --learner-bg: #1d3049;
    --learner-border: #2b4668;
    /* shape & rhythm */
    --radius: 14px;
    --radius-sm: 10px;
    --content-width: 780px;
    --font: 16px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-brand: "Georgia", "Times New Roman", serif;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg0); color: var(--text); font: var(--font);
    display: flex; flex-direction: column; min-height: 100vh;
    background-image: radial-gradient(1200px 500px at 50% -220px, #16202e 0%, var(--bg0) 70%);
  }

  /* ---- header / navigation -------------------------------------- */
  header {
    padding: 12px 22px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    background: rgba(11, 15, 21, 0.82);
    position: sticky; top: 0; backdrop-filter: blur(6px); z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
  .brand svg { display: block; }
  .brand .name {
    font-family: var(--font-brand); font-size: 21px; letter-spacing: .06em;
  }
  .brand .name::after { content: "."; color: var(--gold); }
  .brand .tag { font-size: 12px; color: var(--faint); margin-left: 6px; letter-spacing: .08em; text-transform: uppercase; }
  .badges { display: flex; gap: 7px; flex-wrap: wrap; margin-left: 6px; }
  .badge {
    font-size: 12px; color: var(--muted); border: 1px solid var(--border);
    border-radius: 999px; padding: 2px 10px; background: var(--bg1);
  }
  nav { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  nav a {
    color: var(--muted); text-decoration: none; font-size: 14px;
    border: 1px solid var(--border); border-radius: 999px; padding: 6px 14px;
    transition: color .15s, border-color .15s;
  }
  nav a:hover { color: var(--gold); border-color: var(--gold-soft); }

  /* ---- provider/model chip (PR-F3) -------------------------------- */
  .llm-chip {
    font-size: 12px; color: var(--muted); border: 1px solid var(--border);
    border-radius: 999px; padding: 3px 12px; background: var(--bg1);
    cursor: default; white-space: nowrap;
  }
  .llm-chip.warn { color: var(--danger); border-color: var(--danger); cursor: pointer; }

  /* ---- verification notice / cheap-profile caveat (PR-W1) --------- */
  .verify-notice {
    max-width: 88%; margin: -6px 0 0; padding: 8px 14px; font-size: 13px;
    color: var(--danger); border: 1px dashed var(--danger); border-radius: var(--radius-sm);
    background: var(--bg1); align-self: flex-start;
  }

  main { flex: 1; max-width: var(--content-width); width: 100%; margin: 0 auto; padding: 24px 20px 0; }
  .hidden { display: none !important; }

  /* ---- setup hero ------------------------------------------------ */
  #setup { margin-top: 14vh; text-align: center; }
  #setup h2 {
    font-family: var(--font-brand); font-weight: 500; font-size: 28px;
    margin: 0 0 6px; letter-spacing: .02em;
  }
  #setup p.hint { color: var(--faint); margin: 0 0 26px; font-size: 15px; }
  #setup .row { display: flex; gap: 10px; }
  #setup input {
    flex: 1; padding: 14px 16px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong); background: var(--bg2);
    color: var(--text); font-size: 16px; outline: none;
  }
  #setup input:focus { border-color: var(--gold-soft); }

  /* ---- session resume (PR-R1) ------------------------------------ */
  .navlink { color: var(--faint); font-size: 14px; margin-right: 14px; cursor: pointer; text-decoration: none; }
  .navlink:hover { color: var(--gold); }
  .history-head { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  .history-back { background: none; border: none; color: var(--faint); cursor: pointer; font: inherit; }
  .history-back:hover { color: var(--gold); }
  .history-section { margin: 20px 0 8px; font-size: 14px; color: var(--gold); }
  .history-list { list-style: none; padding: 0; margin: 0; }
  .history-item { display: flex; justify-content: space-between; gap: 12px; padding: 10px 12px; border: 1px solid var(--line, #2a3140); border-radius: 8px; margin-bottom: 6px; cursor: pointer; }
  .history-item:hover { border-color: var(--gold); }
  .history-topic { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-meta { color: var(--faint); font-size: 13px; flex-shrink: 0; }
  .review-btn { margin-top: 12px; width: 100%; padding: 10px 12px; background: var(--gold, #d3b673); color: #1a1a1a; border: none; border-radius: 8px; font: inherit; font-weight: 600; cursor: pointer; }
  .review-btn:hover { filter: brightness(1.06); }
  .source-select {
    width: 100%; margin-top: 10px; padding: 10px 12px;
    background: var(--panel, #1a1f2b); color: var(--text, #e8eaed);
    border: 1px solid var(--line, #2a3140); border-radius: 8px; font: inherit;
  }

  /* ---- profile questionnaire (PR-F3) ------------------------------ */
  #profile { max-width: 520px; margin: 6vh auto 40px; }
  #profile-hint { color: var(--faint); font-size: 14px; margin: -4px 0 18px; }
  #profile-form { display: flex; flex-direction: column; gap: 16px; }
  #profile-form label {
    display: flex; flex-direction: column; gap: 6px;
    font-size: 13.5px; color: var(--muted);
  }
  #profile-form input {
    padding: 12px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong); background: var(--bg2);
    color: var(--text); font-size: 15px; outline: none; font-family: inherit;
  }
  #profile-form input:focus { border-color: var(--gold-soft); }
  #profile-form .form-hint { color: var(--faint); font-size: 12px; }
  #profile-save { align-self: flex-start; }
  #resume { margin-top: 34px; text-align: left; }
  #resume-card:empty { display: none; }
  .resume-primary {
    width: 100%; display: flex; align-items: baseline; gap: 10px;
    padding: 16px 18px; border-radius: var(--radius); border: 1px solid var(--gold-soft);
    background: var(--bg1); color: var(--text); cursor: pointer; text-align: left;
    font-size: 15px; font-weight: 400; margin-bottom: 14px;
  }
  .resume-primary:hover { border-color: var(--gold); filter: none; }
  .resume-primary .resume-label { font-weight: 600; color: var(--gold); flex-shrink: 0; }
  .resume-primary .resume-topic { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .resume-primary .resume-time { color: var(--faint); font-size: 13px; flex-shrink: 0; }
  #sessions-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  #sessions-list li {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--bg1); cursor: pointer; font-size: 13.5px;
  }
  #sessions-list li:hover { border-color: var(--border-strong); }
  .session-badge { font-size: 11px; padding: 1px 8px; border-radius: 999px; flex-shrink: 0; border: 1px solid var(--border); }
  .session-badge.open { color: var(--sage); border-color: var(--sage); }
  .session-badge.closed { color: var(--faint); }
  .session-item-topic { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
  .session-item-time { color: var(--faint); font-size: 12px; flex-shrink: 0; }

  button {
    padding: 12px 20px; border-radius: var(--radius-sm); border: none; cursor: pointer;
    background: var(--gold); color: #14100a; font-weight: 600; font-size: 15px;
    transition: filter .15s;
  }
  button:hover { filter: brightness(1.08); }
  button.secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  button.secondary:hover { color: var(--danger); border-color: var(--danger); filter: none; }
  button:disabled { opacity: .45; cursor: wait; }

  /* ---- conversation ---------------------------------------------- */
  #messages { display: flex; flex-direction: column; gap: 14px; padding-bottom: 150px; }
  .msg { padding: 13px 17px; border-radius: var(--radius); max-width: 88%; overflow-wrap: break-word; }
  .tutor { background: var(--bg1); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
  .learner {
    background: var(--learner-bg); border: 1px solid var(--learner-border);
    align-self: flex-end; border-bottom-right-radius: 4px; white-space: pre-wrap;
  }

  /* markdown inside tutor bubbles */
  .tutor > :first-child { margin-top: 0; }
  .tutor > :last-child { margin-bottom: 0; }
  .tutor p { margin: .55em 0; }
  .tutor h1, .tutor h2, .tutor h3 { font-size: 15px; margin: .8em 0 .35em; color: var(--gold); letter-spacing: .03em; }
  .tutor ul, .tutor ol { margin: .45em 0; padding-left: 1.35em; }
  .tutor li { margin: .22em 0; }
  .tutor code {
    font-family: var(--mono); font-size: 13.5px; background: var(--bg2);
    border: 1px solid var(--border); border-radius: 5px; padding: 1px 5px;
  }
  .tutor pre {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px 14px; overflow-x: auto; margin: .6em 0;
  }
  .tutor pre code { background: none; border: none; padding: 0; }
  .tutor blockquote { margin: .55em 0; padding: 2px 0 2px 12px; border-left: 3px solid var(--gold-soft); color: var(--muted); }
  .tutor strong { color: var(--text); }

  /* per-task progress chip (PR-E2 state, restyled in F2) */
  .status { text-align: center; }
  .status span {
    display: inline-block; font-size: 12px; color: var(--faint);
    border: 1px dashed var(--border); border-radius: 999px; padding: 2px 12px;
  }
  .error { color: var(--danger); font-size: 14px; text-align: center; padding: 4px 0 12px; }

  /* typing indicator */
  .typing { display: inline-flex; gap: 5px; padding: 16px 18px; }
  .typing i {
    width: 6px; height: 6px; border-radius: 50%; background: var(--faint);
    animation: pulse 1.2s infinite ease-in-out;
  }
  .typing i:nth-child(2) { animation-delay: .18s; }
  .typing i:nth-child(3) { animation-delay: .36s; }
  @keyframes pulse { 0%, 70%, 100% { opacity: .25; } 35% { opacity: 1; transform: translateY(-2px); } }

  /* ---- closing record -------------------------------------------- */
  #record {
    background: var(--bg1); border: 1px solid var(--border); border-left: 3px solid var(--sage);
    border-radius: var(--radius); padding: 20px 22px; margin: 18px 0 40px;
  }
  #record h2 {
    margin: 0 0 12px; font-size: 15px; color: var(--sage);
    letter-spacing: .08em; text-transform: uppercase; font-weight: 600;
  }
  #record dl { margin: 0; }
  #record dt { color: var(--faint); font-size: 12px; margin-top: 12px; letter-spacing: .06em; text-transform: uppercase; }
  #record dd { margin: 3px 0 0; }

  /* ---- composer --------------------------------------------------- */
  #composer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, var(--bg0) 32%); padding: 26px 20px 18px;
  }
  #composer .inner { max-width: var(--content-width); margin: 0 auto; display: flex; gap: 10px; }
  #composer textarea {
    flex: 1; padding: 13px 15px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong); background: var(--bg2);
    color: var(--text); font-size: 16px; resize: none; height: 52px; outline: none;
  }
  #composer textarea:focus { border-color: var(--gold-soft); }

  @media (max-width: 640px) {
    header { padding: 10px 14px; flex-wrap: wrap; }
    .badges { order: 3; width: 100%; margin-left: 0; }
    #setup { margin-top: 8vh; }
    #setup .row { flex-direction: column; }
    .msg { max-width: 100%; }
  }
</style>
</head>
<body>
<header>
  <a class="brand" href="/" aria-label="Atenea">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-hidden="true">
      <!-- minimal owl mark -->
      <circle cx="13" cy="13" r="11.5" stroke="#d3b673" stroke-width="1.6"/>
      <circle cx="9" cy="11.5" r="2.6" stroke="#d3b673" stroke-width="1.4"/>
      <circle cx="17" cy="11.5" r="2.6" stroke="#d3b673" stroke-width="1.4"/>
      <circle cx="9" cy="11.5" r="0.9" fill="#d3b673"/>
      <circle cx="17" cy="11.5" r="0.9" fill="#d3b673"/>
      <path d="M11.9 15.6 L13 17.2 L14.1 15.6" stroke="#d3b673" stroke-width="1.3" stroke-linejoin="round"/>
    </svg>
    <span>
      <span class="name">Atenea</span>
      <span class="tag">tutor</span>
    </span>
  </a>
  <div class="badges" id="badges"></div>
  <nav>
    <span id="llm-chip" class="llm-chip hidden"></span>
    <span id="verify-chip" class="llm-chip warn hidden" title="Perfil de verificación económico: más barato, más errores">Perfil económico: más errores</span>
    <a id="profile-link" class="navlink" href="#">Perfil</a>
    <a id="history-link" class="navlink" href="#">Historial</a>
    <a id="progress-link" class="navlink" href="#">Tu progreso</a>
    <a id="notebooks-link" class="hidden" target="_blank" rel="noopener">Notebooks ↗</a>
  </nav>
</header>
<main>
  <div id="setup">
    <h2>¿Qué trabajamos hoy?</h2>
    <p class="hint">Abre una sesión sobre cualquier tema de tus fuentes.</p>
    <div class="row">
      <input id="topic" placeholder="Tema de la sesión…" autofocus>
      <button id="start">Empezar</button>
    </div>
    <button id="review-btn" class="review-btn hidden">Repasar lo pendiente</button>
    <select id="source" class="source-select hidden" aria-label="Fuente (opcional)">
      <option value="">Sin fuente — buscar en todo el material</option>
    </select>
    <div id="resume" class="hidden">
      <div id="resume-card"></div>
      <ul id="sessions-list"></ul>
    </div>
  </div>
  <div id="chat" class="hidden">
    <div id="messages"></div>
    <div id="record" class="hidden"></div>
  </div>
  <div id="history" class="hidden">
    <div class="history-head">
      <button id="history-back" type="button" class="history-back">← Volver</button>
      <h2>Historial y progreso</h2>
    </div>
    <div id="history-body"></div>
  </div>
  <div id="progress" class="hidden">
    <div class="history-head">
      <button id="progress-back" type="button" class="history-back">← Volver</button>
      <h2>Tu progreso</h2>
    </div>
    <div id="progress-body"></div>
  </div>
  <div id="profile" class="hidden">
    <div class="history-head">
      <button id="profile-back" type="button" class="history-back">← Volver</button>
      <h2 id="profile-title">Tu perfil de aprendizaje</h2>
    </div>
    <p id="profile-hint" class="hidden"></p>
    <form id="profile-form">
      <label>¿Qué quieres aprender? (tu objetivo)
        <input id="profile-goal" required>
      </label>
      <label>¿Cómo evaluarías tu nivel actual?
        <input id="profile-level" required>
      </label>
      <label>¿Cuántas horas por semana puedes dedicarle?
        <input id="profile-hours" type="number" min="0.1" step="0.1" required>
      </label>
      <label>Formatos preferidos
        <input id="profile-formats" placeholder="texto, video, audio, ejercicios…">
        <span class="form-hint">Separados por coma.</span>
      </label>
      <p id="profile-error" class="error hidden"></p>
      <button id="profile-save" type="submit">Guardar perfil</button>
    </form>
  </div>
  <p id="error" class="error hidden"></p>
</main>
<div id="composer" class="hidden">
  <div class="inner">
    <textarea id="input" placeholder="Tu respuesta…  (Shift+Enter: salto de línea)"></textarea>
    <button id="send">Enviar</button>
    <button id="close" class="secondary" title="Cerrar la sesión y guardar el registro">Cerrar</button>
  </div>
</div>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
let sessionId = null;

/* ---- per-request identity (PR-BT1): magic-link token -------------------
   R1's "no localStorage" rule was about SESSION state (server-derived by
   design); this is a credential, which is exactly what localStorage is for.
   On load: read ?t= (the magic-link landing), persist it, strip it from the
   URL (never leave a bearer token sitting in the address bar/history), and
   send it as `Authorization: Bearer <token>` on every API call from then on.
   With TUTOR_AUTH_ENABLED=false (default) the server ignores it entirely, so
   this is a no-op in the common dev/single-tenant case. ---- */
const ATENEA_TOKEN_KEY = "atenea_token";

function initAuthToken() {
  const params = new URLSearchParams(window.location.search);
  const t = params.get("t");
  if (t) {
    localStorage.setItem(ATENEA_TOKEN_KEY, t);
    params.delete("t");
    const rest = params.toString();
    const url = window.location.pathname + (rest ? "?" + rest : "") + window.location.hash;
    window.history.replaceState({}, "", url);
  }
}
initAuthToken();

function authHeaders(extra) {
  const token = localStorage.getItem(ATENEA_TOKEN_KEY);
  const headers = Object.assign({}, extra || {});
  if (token) headers["Authorization"] = "Bearer " + token;
  return headers;
}

function show(el, on = true) { el.classList.toggle("hidden", !on); }

/* ---- tiny markdown renderer (escape-first, tutor replies only) ---- */
function escapeHtml(s) {
  return s.replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
}

// Belt-and-braces (BUG 1): a task marker must never reach the learner's
// eyes even if one slips past the server-side strip in engine._advance_task.
// Mirrors tutor/session/markers.py; also eats optional wrapping ** or *.
function stripTaskMarkers(s) {
  return s.replace(/\*{0,2}\[\[\s*TASK\s*:[\s\S]*?\]\]\*{0,2}/gi, "");
}

function inlineMd(s) {
  return s
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|\s)\*([^*\s][^*]*)\*/g, "$1<em>$2</em>");
}

function renderMarkdown(src) {
  src = stripTaskMarkers(src);
  const fenced = [];
  let text = escapeHtml(src).replace(/```[^\n]*\n([\s\S]*?)```/g, (m, code) => {
    fenced.push("<pre><code>" + code.replace(/\n$/, "") + "</code></pre>");
    return "\n\u0000" + (fenced.length - 1) + "\u0000\n";
  });
  const out = [];
  let list = null; // "ul" | "ol" | null
  let para = [];
  const closePara = () => { if (para.length) { out.push("<p>" + para.join("<br>") + "</p>"); para = []; } };
  const closeList = () => { if (list) { out.push("</" + list + ">"); list = null; } };
  for (const raw of text.split("\n")) {
    const line = raw.trimEnd();
    const h = line.match(/^(#{1,3})\s+(.*)$/);
    const ul = line.match(/^\s*[-*]\s+(.*)$/);
    const ol = line.match(/^\s*\d+[.)]\s+(.*)$/);
    const bq = line.match(/^\s*&gt;\s?(.*)$/);
    const block = line.match(/^\u0000(\d+)\u0000$/);
    if (!line.trim()) { closePara(); closeList(); }
    else if (block) { closePara(); closeList(); out.push(fenced[Number(block[1])]); }
    else if (h) { closePara(); closeList(); out.push("<h3>" + inlineMd(h[2]) + "</h3>"); }
    else if (bq) { closePara(); closeList(); out.push("<blockquote>" + inlineMd(bq[1]) + "</blockquote>"); }
    else if (ul) { closePara(); if (list !== "ul") { closeList(); out.push("<ul>"); list = "ul"; } out.push("<li>" + inlineMd(ul[1]) + "</li>"); }
    else if (ol) { closePara(); if (list !== "ol") { closeList(); out.push("<ol>"); list = "ol"; } out.push("<li>" + inlineMd(ol[1]) + "</li>"); }
    else { closeList(); para.push(inlineMd(line)); }
  }
  closePara(); closeList();
  return out.join("\n");
}

/* ---- conversation ------------------------------------------------- */
function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  if (role === "tutor") div.innerHTML = renderMarkdown(text);
  else div.textContent = text;
  $("messages").appendChild(div);
  div.scrollIntoView({ behavior: "smooth", block: "end" });
  return div;
}

/* ---- verification notice (PR-W1): flagged/limits-admitted turns get a
   visible uncertainty notice right under the tutor bubble. ---- */
const VERIFY_NOTICE = {
  flagged: "⚠ Esta respuesta no pasó la verificación automática — revísala con cuidado (perfil económico).",
  "limits-admitted": "⚠ El material no permite confirmar todo esto con certeza; el tutor lo reconoce arriba.",
};

function addVerificationNotice(outcome) {
  const text = VERIFY_NOTICE[outcome];
  if (!text) return;
  const p = document.createElement("p");
  p.className = "verify-notice";
  p.textContent = text;
  $("messages").appendChild(p);
}

function addStatus(text) {
  const p = document.createElement("p");
  p.className = "status";
  const chip = document.createElement("span");
  chip.textContent = text;
  p.appendChild(chip);
  $("messages").appendChild(p);
}

function addTyping() {
  const div = document.createElement("div");
  div.className = "msg tutor typing";
  div.innerHTML = "<i></i><i></i><i></i>";
  $("messages").appendChild(div);
  div.scrollIntoView({ behavior: "smooth", block: "end" });
  return div;
}

function setError(text) {
  $("error").textContent = text || "";
  show($("error"), Boolean(text));
}

const FRIENDLY = {
  409: "Aún no hay perfil de aprendiz — crea tu perfil (cuestionario inicial) antes de abrir una sesión.",
  503: "El tutor no tiene LLM configurado (TUTOR_LLM_PROVIDER / TUTOR_LLM_MODEL) o el servicio no está listo.",
  401: "Tu acceso no es válido o ha caducado — pide tu enlace de acceso.",
};

// Pure helper (node-smoke-able): FastAPI 422 bodies carry `detail` as a list
// of {msg, loc, ...} — turn that into one readable line instead of
// "[object Object]". String details (409, 502, ...) pass through untouched.
function formatApiDetail(body, fallback) {
  const detail = body && body.detail;
  if (typeof detail === "string" && detail) return detail;
  if (Array.isArray(detail) && detail.length) {
    return detail
      .map((d) => (d && typeof d === "object" ? d.msg || JSON.stringify(d) : String(d)))
      .join("; ");
  }
  return fallback;
}

async function api(path, options) {
  const opts = Object.assign({}, options);
  opts.headers = authHeaders(opts.headers);
  let response;
  try {
    response = await fetch(path, opts);
  } catch (e) {
    throw new Error("Sin conexión con el tutor — ¿está corriendo el servicio en este puerto?");
  }
  if (!response.ok) {
    let detail = response.statusText;
    try { detail = formatApiDetail(await response.json(), detail); } catch (e) { /* keep statusText */ }
    if (FRIENDLY[response.status]) detail = FRIENDLY[response.status];
    const err = new Error(detail);
    err.status = response.status;
    throw err;
  }
  return response.json();
}

function taskStatus(index, label, attempts, helpLevel) {
  // Per-task progress (PR-E2): attempts and help reset on each new task.
  const parts = [];
  if (index > 0) parts.push(`tarea ${index}${label ? ` · “${label}”` : ""}`);
  parts.push(`intento ${attempts}`);
  if (helpLevel > 0) parts.push(`ayuda ${helpLevel}/4`);
  return parts.join(" · ");
}

async function startSession() {
  const topic = $("topic").value.trim();
  if (!topic) return;
  setError("");
  $("start").disabled = true;
  try {
    const data = await api("/session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ topic, source_id: $("source").value || null }),
    });
    sessionId = data.session_id;
    const t = data.traits, plan = data.technique;
    $("badges").innerHTML = "";
    [t.production, t.verifiability, t.structure, plan.primary].forEach((label) => {
      const span = document.createElement("span");
      span.className = "badge";
      span.textContent = label;
      $("badges").appendChild(span);
    });
    show($("setup"), false);
    show($("chat"));
    show($("composer"));
    addMsg("tutor", data.opening_message);
    addVerificationNotice(data.verification_outcome);
    if (data.task_index > 0) addStatus(taskStatus(data.task_index, data.task_label, 0, 0));
    setSessionHash(sessionId);
    $("input").focus();
  } catch (err) {
    if (err.status === 409) openProfileOnboarding(startSession);
    else setError(err.message);
  } finally {
    $("start").disabled = false;
  }
}

async function startReview() {
  setError("");
  $("review-btn").disabled = true;
  try {
    const data = await api("/review", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
    });
    sessionId = data.session_id;
    const t = data.traits, plan = data.technique;
    $("badges").innerHTML = "";
    [t.production, t.verifiability, t.structure, plan.primary].forEach((label) => {
      const span = document.createElement("span");
      span.className = "badge";
      span.textContent = label;
      $("badges").appendChild(span);
    });
    show($("setup"), false);
    show($("chat"));
    show($("composer"));
    addMsg("tutor", data.opening_message);
    addVerificationNotice(data.verification_outcome);
    if (data.task_index > 0) addStatus(taskStatus(data.task_index, data.task_label, 0, 0));
    setSessionHash(sessionId);
    $("input").focus();
  } catch (err) {
    if (err.status === 409) openProfileOnboarding(startReview);
    else setError(err.message);
  } finally {
    $("review-btn").disabled = false;
  }
}

async function loadDue() {
  try {
    const due = await api("/reviews/due");
    if (Array.isArray(due) && due.length) {
      const btn = $("review-btn");
      btn.textContent = `Repasar lo pendiente (${due.length})`;
      show(btn, true);
    }
  } catch (e) { /* review is optional — never block a fresh start */ }
}

async function sendMessage() {
  const text = $("input").value.trim();
  if (!text || !sessionId) return;
  setError("");
  addMsg("learner", text);
  $("input").value = "";
  $("send").disabled = true;
  const typing = addTyping();
  try {
    const data = await api(`/session/${encodeURIComponent(sessionId)}/message`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });
    typing.remove();
    addMsg("tutor", data.reply);
    addVerificationNotice(data.verification_outcome);
    if (data.task_index > 0 || data.help_level > 0 || data.attempts > 0) {
      addStatus(taskStatus(data.task_index, data.task_label, data.attempts, data.help_level));
    }
  } catch (err) {
    typing.remove();
    setError(err.message);
  } finally {
    $("send").disabled = false;
    $("input").focus();
  }
}

async function closeSession() {
  if (!sessionId) return;
  setError("");
  $("close").disabled = true;
  try {
    const record = await api(`/session/${encodeURIComponent(sessionId)}/close`, { method: "POST" });
    const el = $("record");
    el.innerHTML = "<h2>Registro de sesión</h2><dl>" +
      field("Resumen", record.summary) +
      field("Evaluación", record.assessment) +
      field("Siguiente paso", record.next_step) +
      field("Repasar el", (record.review_date || "").slice(0, 10)) +
      "</dl>";
    show(el);
    show($("composer"), false);
    addStatus("Sesión cerrada y guardada.");
    el.scrollIntoView({ behavior: "smooth" });
  } catch (err) {
    setError(err.message);
    $("close").disabled = false;
  }
}

function field(label, value) {
  return `<dt>${label}</dt><dd>${escapeHtml((value || "—").toString())}</dd>`;
}

/* ---- session resume (PR-R1) ---------------------------------------
   State stays server-derived: no localStorage. The URL hash (#s=<id>)
   is the only client-side memory, so a reload or a fresh service
   restart both resolve the same way — ask the server what it has. */
function setSessionHash(id) {
  if (id) window.location.hash = "s=" + encodeURIComponent(id);
}

function sessionIdFromHash() {
  const m = window.location.hash.match(/#s=(.+)$/);
  return m ? decodeURIComponent(m[1]) : null;
}

function relativeTime(iso) {
  if (!iso) return "";
  const then = new Date(iso).getTime();
  if (Number.isNaN(then)) return "";
  const minutes = Math.round((Date.now() - then) / 60000);
  if (minutes < 1) return "justo ahora";
  if (minutes < 60) return `hace ${minutes} min`;
  const hours = Math.round(minutes / 60);
  if (hours < 24) return `hace ${hours} h`;
  const days = Math.round(hours / 24);
  return `hace ${days} d`;
}

function renderSessionsPanel(sessions) {
  const resumeEl = $("resume");
  const cardEl = $("resume-card");
  const listEl = $("sessions-list");
  cardEl.innerHTML = "";
  listEl.innerHTML = "";
  const openSessions = sessions.filter((s) => s.status === "open");
  if (!openSessions.length) { show(resumeEl, false); return; }

  const latest = openSessions[0];
  const card = document.createElement("button");
  card.type = "button";
  card.className = "resume-primary";
  card.innerHTML =
    '<span class="resume-label">Continuar</span>' +
    '<span class="resume-topic">' + escapeHtml(latest.topic || "sesión sin título") + "</span>" +
    '<span class="resume-time">' + escapeHtml(relativeTime(latest.updated_at)) + "</span>";
  card.addEventListener("click", () => openSessionById(latest.session_id));
  cardEl.appendChild(card);

  sessions.slice(0, 5).forEach((s) => {
    const li = document.createElement("li");
    const badge = document.createElement("span");
    badge.className = "session-badge " + s.status;
    badge.textContent = s.status === "open" ? "abierta" : "cerrada";
    const topic = document.createElement("span");
    topic.className = "session-item-topic";
    topic.textContent = s.topic || "sesión sin título";
    const time = document.createElement("span");
    time.className = "session-item-time";
    time.textContent = relativeTime(s.updated_at);
    li.appendChild(badge);
    li.appendChild(topic);
    li.appendChild(time);
    li.addEventListener("click", () => openSessionById(s.session_id));
    listEl.appendChild(li);
  });
  show(resumeEl, true);
}

function whenLabel(iso) {
  if (!iso) return "";
  const then = new Date(iso).getTime();
  if (Number.isNaN(then)) return "";
  const days = Math.round((then - Date.now()) / 86400000);
  if (days > 1) return `en ${days} d`;
  if (days === 1) return "mañana";
  if (days === 0) return "hoy";
  if (days === -1) return "ayer";
  return `hace ${-days} d`;
}

function isDue(s) {
  if (s.status !== "closed" || !s.review_date) return false;
  const d = new Date(s.review_date).getTime();
  return !Number.isNaN(d) && d <= Date.now();
}

function renderProgress(memories) {
  const body = $("progress-body");
  body.innerHTML = "";
  if (!Array.isArray(memories) || !memories.length) {
    body.innerHTML =
      '<p class="hint">Aún no hay progreso registrado — cierra una sesión para empezar a construirlo.</p>';
    return;
  }
  const ul = document.createElement("ul");
  ul.className = "history-list";
  for (const m of memories) {
    const li = document.createElement("li");
    li.className = "history-item";
    const topic = document.createElement("span");
    topic.className = "history-topic";
    const mastery =
      typeof m.mastery_estimate === "number"
        ? `${Math.round(m.mastery_estimate * 100)}%`
        : "—";
    topic.textContent = `${m.topic_label || m.topic_key || "tema sin título"} · ${mastery}`;
    const meta = document.createElement("span");
    meta.className = "history-meta";
    const errors = (m.recurring_errors || []).join(", ");
    // PR-G3: estimated retention (Ebbinghaus decay since last seen).
    const retentionText =
      typeof m.estimated_retention === "number"
        ? `retención ~${Math.round(m.estimated_retention * 100)}% · `
        : "";
    meta.textContent =
      (errors ? `errores recurrentes: ${errors} · ` : "") +
      retentionText +
      (m.updated ? relativeTime(m.updated) : "");
    li.appendChild(topic);
    li.appendChild(meta);
    ul.appendChild(li);
  }
  body.appendChild(ul);
}

async function loadProgress() {
  const body = $("progress-body");
  body.innerHTML = '<p class="hint">Cargando…</p>';
  try {
    renderProgress(await api("/memories"));
  } catch (e) {
    body.innerHTML = '<p class="error">No se pudo cargar tu progreso.</p>';
  }
}

function showProgress() {
  show($("setup"), false);
  show($("chat"), false);
  show($("profile"), false);
  show($("history"), false);
  show($("progress"), true);
  loadProgress();
}

function renderHistory(sessions) {
  const body = $("history-body");
  body.innerHTML = "";
  const groups = [
    ["Para repasar", sessions.filter(isDue)],
    ["Abiertas", sessions.filter((s) => s.status === "open")],
    ["Completadas", sessions.filter((s) => s.status === "closed" && !isDue(s))],
  ];
  let any = false;
  for (const [title, items] of groups) {
    if (!items.length) continue;
    any = true;
    const h = document.createElement("h3");
    h.className = "history-section";
    h.textContent = `${title} (${items.length})`;
    body.appendChild(h);
    const ul = document.createElement("ul");
    ul.className = "history-list";
    for (const s of items) {
      const li = document.createElement("li");
      li.className = "history-item";
      const topic = document.createElement("span");
      topic.className = "history-topic";
      topic.textContent = s.topic || "sesión sin título";
      const meta = document.createElement("span");
      meta.className = "history-meta";
      meta.textContent = s.review_date ? `repaso ${whenLabel(s.review_date)}` : relativeTime(s.updated_at);
      li.appendChild(topic);
      li.appendChild(meta);
      li.addEventListener("click", () => openSessionById(s.session_id));
      ul.appendChild(li);
    }
    body.appendChild(ul);
  }
  if (!any) body.innerHTML = '<p class="hint">Aún no hay sesiones.</p>';
}

async function loadHistory() {
  const body = $("history-body");
  body.innerHTML = '<p class="hint">Cargando…</p>';
  try {
    renderHistory(await api("/sessions"));
  } catch (e) {
    body.innerHTML = '<p class="error">No se pudo cargar el historial.</p>';
  }
}

function showHistory() {
  show($("setup"), false); show($("chat"), false); show($("profile"), false); show($("progress"), false); show($("history"), true);
  loadHistory();
}

function showSetup() {
  show($("history"), false); show($("chat"), false); show($("profile"), false); show($("progress"), false); show($("setup"), true);
}

/* ---- profile questionnaire (PR-F3) ---------------------------------
   First-run: a 409 from /session or /review opens this form pre-empty;
   on success it PUTs /profile and seamlessly retries the action that
   triggered it. Later edits go through the "Perfil" nav item, which
   pre-fills from GET /profile instead. */
let profileRetryAction = null;

function fillProfileForm(profile) {
  $("profile-form").reset();
  if (!profile) return;
  $("profile-goal").value = profile.learning_goal || "";
  $("profile-level").value = profile.self_assessed_level || "";
  $("profile-hours").value = profile.weekly_availability_hours || "";
  $("profile-formats").value = (profile.format_preferences || []).join(", ");
}

function showProfileView() {
  show($("setup"), false); show($("chat"), false); show($("history"), false); show($("progress"), false);
  show($("profile"), true);
  $("profile-error").classList.add("hidden");
}

async function openProfileEditor() {
  profileRetryAction = null;
  $("profile-title").textContent = "Tu perfil de aprendizaje";
  show($("profile-hint"), false);
  showProfileView();
  try {
    fillProfileForm(await api("/profile"));
  } catch (e) {
    fillProfileForm(null); // 404 — no profile yet, start from a blank form
  }
}

function openProfileOnboarding(retryAction) {
  profileRetryAction = retryAction;
  $("profile-title").textContent = "Antes de empezar: cuéntanos de ti";
  const hint = $("profile-hint");
  hint.textContent =
    "Necesitamos un perfil rápido antes de tu primera sesión — se guarda una " +
    "vez y luego puedes editarlo desde “Perfil”.";
  show(hint, true);
  showProfileView();
  fillProfileForm(null);
}

// Pure helper (node-smoke-able): "texto, video,  " -> ["texto", "video"].
function parseFormatPreferences(raw) {
  return raw.split(",").map((s) => s.trim()).filter(Boolean);
}

async function submitProfileForm(event) {
  event.preventDefault();
  const errEl = $("profile-error");
  errEl.classList.add("hidden");
  const payload = {
    learning_goal: $("profile-goal").value.trim(),
    self_assessed_level: $("profile-level").value.trim(),
    weekly_availability_hours: parseFloat($("profile-hours").value),
    format_preferences: parseFormatPreferences($("profile-formats").value),
  };
  $("profile-save").disabled = true;
  try {
    await api("/profile", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const retry = profileRetryAction;
    profileRetryAction = null;
    showSetup();
    if (retry) await retry();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove("hidden");
  } finally {
    $("profile-save").disabled = false;
  }
}

async function loadSessionsPanel() {
  try {
    const sessions = await api("/sessions");
    renderSessionsPanel(sessions);
  } catch (e) { /* the resume affordance is optional — never block a fresh start */ }
}

function renderTranscript(record) {
  $("messages").innerHTML = "";
  for (const turn of record.transcript || []) {
    addMsg(turn.role === "learner" ? "learner" : "tutor", turn.content);
    // PR-W1: a resumed/replayed session shows the same notice a flagged or
    // limits-admitted turn got live — the trace is inspectable, not just live.
    if (turn.verification) addVerificationNotice(turn.verification.outcome);
  }
  if (record.traits && record.technique) {
    $("badges").innerHTML = "";
    const t = record.traits, plan = record.technique;
    [t.production, t.verifiability, t.structure, plan.primary].forEach((label) => {
      const span = document.createElement("span");
      span.className = "badge";
      span.textContent = label;
      $("badges").appendChild(span);
    });
  }
}

async function openSessionById(id) {
  setError("");
  try {
    const record = await api(`/session/${encodeURIComponent(id)}`);
    const resolvedId = record.id || id;
    renderTranscript(record);
    show($("setup"), false);
    show($("chat"), true);
    if (record.status === "closed") {
      sessionId = null;
      show($("composer"), false);
      const el = $("record");
      el.innerHTML = "<h2>Registro de sesión</h2><dl>" +
        field("Resumen", record.summary) +
        field("Evaluación", record.assessment) +
        field("Siguiente paso", record.next_step) +
        field("Repasar el", (record.review_date || "").slice(0, 10)) +
        "</dl>";
      show(el, true);
    } else {
      sessionId = resolvedId;
      show($("record"), false);
      show($("composer"), true);
      const task = record.task || {};
      const help = record.help || {};
      if (task.index > 0) addStatus(taskStatus(task.index, task.label, help.attempts || 0, help.help_level || 0));
      $("input").focus();
    }
    setSessionHash(resolvedId);
  } catch (err) {
    setError(err.message);
    show($("setup"), true);
  }
}

/* ---- provider/model chip (PR-F3): visibility only, never a key ----- */
function renderLlmChip(cfg) {
  const chip = $("llm-chip");
  if (cfg && cfg.llm_provider && cfg.llm_model) {
    chip.textContent = cfg.llm_provider + " · " + cfg.llm_model;
    chip.classList.remove("warn");
    chip.onclick = null;
  } else {
    chip.textContent = "LLM sin configurar";
    chip.classList.add("warn");
    chip.onclick = () => setError(FRIENDLY[503]);
  }
  show(chip, true);
}

/* ---- single entry point: link out to OpenNotebook (PR-F2) --------- */
async function loadUiConfig() {
  let cfg = null;
  try {
    cfg = await (await fetch("/config", { headers: authHeaders() })).json();
    if (cfg.notebook_ui_url) {
      const link = $("notebooks-link");
      link.href = cfg.notebook_ui_url;
      link.title = "Abrir OpenNotebook (" + cfg.notebook_ui_url + ")";
      show(link);
    }
  } catch (e) { /* nav link is optional — never block the session flow */ }
  renderLlmChip(cfg);
  // PR-W1: standing "cheaper ⇒ more errors" caveat — visible whenever
  // verification is on AND running the cheap profile (never for "off" or
  // the default "high" profile, which doesn't carry that tradeoff).
  show($("verify-chip"), Boolean(cfg && cfg.verify_turns !== "off" && cfg.verify_profile === "cheap"));
  // Material grounding (PR-M1/F3): the picker only makes sense when the
  // service has grounding on; otherwise it stays hidden entirely.
  if (cfg && cfg.grounding_enabled) {
    show($("source"), true);
    loadSources();
  } else {
    show($("source"), false);
  }
}
loadUiConfig();

/* ---- material picker (PR-M1): populate the source selector ---------- */
async function loadSources() {
  try {
    const sources = await (await fetch("/sources", { headers: authHeaders() })).json();
    if (!Array.isArray(sources) || !sources.length) return;
    const sel = $("source");
    for (const s of sources) {
      const opt = document.createElement("option");
      opt.value = s.id;
      opt.textContent = s.title || s.id;
      sel.appendChild(opt);
    }
  } catch (e) { /* the picker is optional — a source is never required */ }
}

/* ---- boot: resume from the URL hash, otherwise offer recent sessions */
(function initResume() {
  const hashId = sessionIdFromHash();
  if (hashId) openSessionById(hashId);
  else loadSessionsPanel();
})();

$("start").addEventListener("click", startSession);
$("review-btn").addEventListener("click", startReview);
loadDue();
$("history-link").addEventListener("click", (e) => { e.preventDefault(); showHistory(); });
$("history-back").addEventListener("click", showSetup);
$("progress-link").addEventListener("click", (e) => { e.preventDefault(); showProgress(); });
$("progress-back").addEventListener("click", showSetup);
$("profile-link").addEventListener("click", (e) => { e.preventDefault(); openProfileEditor(); });
$("profile-back").addEventListener("click", showSetup);
$("profile-form").addEventListener("submit", submitProfileForm);
$("topic").addEventListener("keydown", (e) => { if (e.key === "Enter") startSession(); });
$("send").addEventListener("click", sendMessage);
$("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
$("close").addEventListener("click", closeSession);
</script>
