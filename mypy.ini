[mypy]
# Lenient baseline config, enforced in CI (backend-typecheck job).
# `mypy .` must exit 0: new type errors are blocked while the
# remaining `ignore_errors = True` modules below are burned down
# over time. Remove a module's block, fix its errors, repeat.
plugins = pydantic.mypy
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = True
no_implicit_optional = False

check_untyped_defs = True
explicit_package_bases = True
mypy_path = .

# Modules still exempt from type checking (burn-down list - shrink it,
# don't grow it)
[mypy-open_notebook.domain.notebook]
ignore_errors = True

# PyYAML is used untyped (tests_tutor/test_compose.py). The GLOBAL
# ignore_missing_imports above deliberately does NOT silence
# "library stubs not installed" for stub-available packages (mypy >= 0.900);
# only a per-module override does. Alternative: add types-PyYAML to deps
# (needs a uv.lock regen — do that on a machine with uv and drop this block).
[mypy-yaml]
ignore_missing_imports = True
