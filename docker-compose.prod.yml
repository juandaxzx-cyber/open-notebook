# Atenea production deploy overlay (PR-BT4, backups added in PR-BT4b).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Adds the Caddy reverse proxy as the ONLY service that publishes host
# ports, and clears every host port the base compose file publishes for
# surrealdb / open_notebook / tutor. This is the Feature BT deployment-
# posture invariant: only the tutor is reachable from the internet, and
# only through Caddy — OpenNotebook's API/UI and SurrealDB stay unpublished
# (BT3's tutor-side source-ownership model is only sound if OpenNotebook
# itself is never directly reachable).
#
# Compose-merge mechanism note (verified against the compose-spec, "Merge
# and override" / "Reset value"): `ports` is a "unique resource" sequence
# (merge key {ip, target, published, protocol}) — Compose APPENDS override
# entries that don't collide with a base entry, it does not replace the
# list. A bare `ports: []` override therefore publishes nothing new and
# silently leaves every base port in place; it does NOT clear them. The
# only mechanism that reliably clears an inherited list is the custom
# `!reset` YAML tag (compose-spec "Reset value", Compose CLI v2.24.4+): a
# value must still be present syntactically but is ignored, and the target
# attribute resets to its type's default (`null`/`[]`). Hence
# `ports: !reset []` below on every service whose host ports must disappear
# — not a plain `ports: []`, which would be a no-op here.
#
# `docker compose -f docker-compose.yml -f docker-compose.prod.yml config`
# renders the merged model and is the way to verify this locally without
# actually deploying (see docs/atenea/deploy_guide.md).
#
# PR-BT4b adds the `backup` service below: it reuses the same
# `surrealdb/surrealdb:v2` image as the base `surrealdb` service (it ships
# the `surreal` CLI at /surreal) to periodically `surreal export` BOTH
# databases the stack uses into the host-mounted `./backups/` directory.
# It publishes no ports (nothing to clear/reset — it never appears in the
# base compose file), so the BT4 deployment-posture invariant above is
# untouched. See deploy/backup.sh (mounted in) and docs/atenea/
# deploy_guide.md "Backups & restore" for the on-demand/restore commands.

services:
  surrealdb:
    ports: !reset []

  open_notebook:
    ports: !reset []

  tutor:
    ports: !reset []

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    # TUTOR_DOMAIN arrives via .env, same zero-duplication pattern the
    # tutor service already uses in docker-compose.yml (env_file, not a
    # hardcoded `environment:` entry). Caddy's automatic-TLS site block
    # (Caddyfile: {$TUTOR_DOMAIN}) reads it straight from the container
    # environment.
    env_file:
      - path: .env
        required: false
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - tutor
    restart: always

  backup:
    image: surrealdb/surrealdb:v2
    # Overrides the base image's default entrypoint (which execs `/surreal`
    # directly) to instead interpret deploy/backup.sh. `entrypoint:` with no
    # `command:` fully replaces the image's ENTRYPOINT+CMD (same Docker
    # semantics as `docker run --entrypoint`), so this is the container's
    # entire long-running process: one pass, sleep
    # TUTOR_BACKUP_INTERVAL_HOURS, repeat. The on-demand path
    # (docs/atenea/deploy_guide.md) runs the SAME script without --loop via
    # `docker compose ... exec backup /backup.sh`, which bypasses this
    # entrypoint entirely (docker exec always runs the given command
    # directly, ignoring image/compose ENTRYPOINT).
    entrypoint: ["/bin/sh", "/backup.sh", "--loop"]
    # Namespace/credentials pinned explicitly (same belt-and-suspenders
    # pattern as the tutor service in docker-compose.yml) so the backup
    # loop never silently runs with the wrong database identity even if
    # .env is incomplete. TUTOR_SURREAL_DATABASE, TUTOR_BACKUP_INTERVAL_HOURS
    # and TUTOR_BACKUP_KEEP arrive via env_file below (zero-duplication
    # pattern, same as the tutor service's TUTOR_* settings) — their
    # defaults live in deploy/backup.sh, not here.
    environment:
      - SURREAL_NAMESPACE=${SURREAL_NAMESPACE:-open_notebook}
      - SURREAL_DATABASE=${SURREAL_DATABASE:-open_notebook}
      - SURREAL_USER=${SURREAL_USER:-root}
      - SURREAL_PASSWORD=${SURREAL_PASSWORD:-root}
    env_file:
      - path: .env
        required: false
    volumes:
      - ./deploy/backup.sh:/backup.sh:ro
      - ./backups:/backups
    depends_on:
      - surrealdb
    restart: always

volumes:
  caddy_data:
  caddy_config:
