name: Tutor CI

on:
  pull_request:
    branches: [main]
    paths:
      - "tutor/**"
      - "tests_tutor/**"
      - ".github/workflows/tutor-ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
  push:
    branches: [main]
    paths:
      - "tutor/**"
      - "tests_tutor/**"
      - ".github/workflows/tutor-ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"

permissions:
  contents: read

jobs:
  check-tutor:
    name: Tutor Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run tutor checks
        run: make check-tutor
